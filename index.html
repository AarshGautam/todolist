<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom App</title>
<link rel="stylesheet" href="/css/todo.css">
</head>
<body>
  <div class="sidebar">
    <button><img src="https://via.placeholder.com/24" alt="Note"></button>
    <button><img src="https://via.placeholder.com/24" alt="To-do"></button>
    <button><img src="https://via.placeholder.com/24" alt="Line"></button>
    <button><img src="https://via.placeholder.com/24" alt="Board"></button>
    <button><img src="https://via.placeholder.com/24" alt="Column"></button>
    <button><img src="https://via.placeholder.com/24" alt="Comment"></button>
    <button><img src="https://via.placeholder.com/24" alt="Table"></button>
    <button><img src="https://via.placeholder.com/24" alt="Add Image"></button>
    <button><img src="https://via.placeholder.com/24" alt="Upload"></button>
    <button><img src="https://via.placeholder.com/24" alt="Draw"></button>
  </div>
  <div class="main-content">
    <div class="header">
        <span>
            <img src="/img/bunnyicon.png" alt="Logo" sizes="24x24" width="24" height="24">
        </span>
      <span>Home</span>
      <div class="right-icons">
        <button><img src="https://via.placeholder.com/20" alt="Refer"></button>
        <button><img src="https://via.placeholder.com/20" alt="Back"></button>
        <button><img src="https://via.placeholder.com/20" alt="Refresh"></button>
        <button><img src="https://via.placeholder.com/20" alt="Fullscreen"></button>
        <button><img src="https://via.placeholder.com/20" alt="Help"></button>
        <button><img src="https://via.placeholder.com/20" alt="Bell"></button>
      </div>
    </div>
    <div class="workspace">
      <div class="boards">
        <div class="board">
          <img src="https://via.placeholder.com/40" alt="Reminder">
          <span>Board<br>1 board, 7 cards</span>
        </div>
        <div class="board">
          <img src="https://via.placeholder.com/40" alt="To-do">
          <span>Notion<br>0 cards</span>
        </div>
        <div class="board">
          <img src="https://via.placeholder.com/40" alt="Assingments">
          <span>To-do<br>1 card</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
